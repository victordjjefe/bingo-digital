<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tabla Bingo</title>

<style>
body{
margin:0;
background: radial-gradient(circle,#1a0033,#000);
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
padding:10px;
}

.logo{
max-width:100%;
max-height:140px;
object-fit:contain;
display:block;
margin:auto;
}

.topBar{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
width:100%;
}

.topRow{
display:flex;
justify-content:space-between;
align-items:center;
width:100%;
gap:10px;
flex-wrap:wrap;
}

.botonModo{
padding:6px 10px;
background:#ffd700;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.selectModo{
padding:6px;
border-radius:8px;
display:none;
}

.botonLimpiar{
padding:6px 12px;
background:#ff4444;
color:white;
border:none;
border-radius:8px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.nombreJugador{
padding:6px 12px;
border-radius:10px;
background:rgba(255,215,0,0.15);
border:1px solid #ffd700;
color:#ffd700;
font-weight:bold;
box-shadow:0 0 10px #ffd700;
}

.fechaHora{
font-size:13px;
opacity:0.8;
}

.contenedor{
background:rgba(0,0,0,0.7);
padding:15px;
border-radius:15px;
box-shadow:0 0 20px #ffd700;
width:100%;
max-width:400px;
text-align:center;
}

.tabla{
display:grid;
grid-template-columns: repeat(5,1fr);
gap:6px;
}

.celda{
background:#111;
display:flex;
justify-content:center;
align-items:center;
aspect-ratio:1/1;
border-radius:10px;
font-weight:bold;
border:2px solid #444;
}

.letra{
background:#ffd700;
color:black;
}

.marcado{
background:#00ff00 !important;
color:black;
}

.centro{
background:#ffd700 !important;
color:black;
}

#bingoAnim{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:#00ff00;
font-weight:bold;
display:none;
}

</style>
</head>

<body>

<div class="contenedor">

<div class="topBar">

<img id="logo" class="logo">

<button class="botonModo" onclick="mostrarModos()">Modo de juego</button>

<select id="modoSelect" class="selectModo" onchange="seleccionarModo()">
<option value="">-- Elegir modo --</option>
<option>Letra X</option>
<option>Letra L</option>
<option>Letra H</option>
<option>Letra T</option>
<option>Diagonal Izq</option>
<option>Diagonal Der</option>
<option>4 Esquinas</option>
<option>Forma O</option>
<option>Tabla Llena</option>
<option>Personalizado</option>
</select>

<div class="topRow">
<button class="botonLimpiar" onclick="limpiarTabla()">Limpiar tabla</button>
<div id="nombreJugador" class="nombreJugador"></div>
</div>

<div id="fechaHora" class="fechaHora"></div>

</div>

<div id="tabla"></div>

</div>

<div id="bingoAnim">🎉 BINGO 🎉</div>

<script>

let audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function beep(){
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.connect(g);
g.connect(audioCtx.destination);
o.frequency.value=800;
o.start();
g.gain.exponentialRampToValueAtTime(0.00001,audioCtx.currentTime+0.15);
}

let bingoDetectado=false;

let patronPersonalizado=Array(5).fill().map(()=>Array(5).fill(false));
let estados=[];
let modoActual="";

function actualizarFechaHora(){
let d=new Date();
document.getElementById("fechaHora").textContent =
d.toLocaleString();
}
setInterval(actualizarFechaHora,1000);
actualizarFechaHora();

function mostrarModos(){
let s=document.getElementById("modoSelect");
s.style.display=s.style.display==="block"?"none":"block";
}

function seleccionarModo(){
modoActual=document.getElementById("modoSelect").value;
}

function limpiarTabla(){

document.querySelectorAll(".celda.marcado").forEach(c=>{
c.classList.remove("marcado");
});

estados.forEach(tabla=>{
for(let i=0;i<5;i++){
for(let j=0;j<5;j++){
tabla[i][j]=false;
}
}
});

bingoDetectado=false;
modoActual="";
document.getElementById("modoSelect").value="";
}

function mostrarBingo(){

if(bingoDetectado) return;

bingoDetectado=true;

let cont=document.querySelector(".contenedor");
let anim=document.getElementById("bingoAnim");

cont.style.display="none";
anim.style.display="block";

setTimeout(()=>{
anim.style.display="none";
cont.style.display="block";
},3000);

}

function verificar(m){

const c=(i,j)=>m[i][j]||(i===2&&j===2);

switch(modoActual){

case "Letra X":
return c(0,0)&&c(1,1)&&c(2,2)&&c(3,3)&&c(4,4)&&
c(0,4)&&c(1,3)&&c(3,1)&&c(4,0);

case "Personalizado":

let ok=true;

for(let i=0;i<5;i++){
for(let j=0;j<5;j++){
if(patronPersonalizado[i][j] && !c(i,j)){
ok=false;
}
}
}

if(ok) mostrarBingo();

return ok;

default:
return false;

}

}

</script>

</body>
</html>
