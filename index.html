<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo</title>

<style>
body{
margin:0;
background: radial-gradient(circle,#1a0033,#000);
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
}

/* LOGO */
.logo{
max-height:140px;
display:block;
margin:auto;
}

.logoNombre{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.nombreJugador{
color:#ffd700;
font-weight:bold;
font-size:20px;
}

/* CONTENEDOR */
.contenedor{
background:rgba(0,0,0,0.7);
padding:15px;
border-radius:15px;
box-shadow:0 0 20px #ffd700;
max-width:420px;
width:100%;
}

/* BOTONES */
.topBar{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
margin-bottom:15px;
}

.botonModo, .botonLimpiar{
padding:6px 10px;
border-radius:8px;
border:none;
font-weight:bold;
cursor:pointer;
}

.botonModo{background:#ffd700;}
.botonLimpiar{background:#ff4444;color:white;}

.selectModo{
display:none;
padding:5px;
border-radius:6px;
}

/* TABLA */
.bloqueTabla{
background:#111;
padding:10px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 0 10px #000;
}

.tabla{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
}

.celda{
background:#111;
display:flex;
justify-content:center;
align-items:center;
aspect-ratio:1;
border-radius:8px;
border:2px solid #444;
font-weight:bold;
}

.letra{background:#ffd700;color:black;}

.marcado{
background:#00ff00 !important;
color:black;
}

.centro{
box-shadow:0 0 15px #00ff00;
}

/* BINGO */
#bingoAnim{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
font-size:60px;
color:#00ff00;
z-index:9999;
}

/* CASI */
#casiBingoAnim{
position:fixed;
top:30%;
left:50%;
transform:translate(-50%,-50%);
font-size:26px;
display:none;
color:#ffd700;
}
</style>
</head>

<body>

<div class="contenedor">

<div class="topBar">

<div class="logoNombre">
<img id="logo" class="logo">
<div id="nombreJugador" class="nombreJugador"></div>
</div>

<button class="botonModo" onclick="mostrarModos()">Modo de juego</button>

<select id="modoSelect" class="selectModo" onchange="seleccionarModo()">
<option value="">-- Elegir modo --</option>
<option>Letra X</option>
<option>Letra L</option>
<option>Letra H</option>
<option>Letra T</option>
<option>Diagonal Izq</option>
<option>Diagonal Der</option>
<option>4 Esquinas</option>
<option>Forma O</option>
<option>Tabla Llena</option>
<option>Personalizado</option>
</select>

<button class="botonLimpiar" onclick="limpiarTabla()">Limpiar tabla</button>

</div>

<div id="editorPatron" style="display:none">
<div>Selecciona patrón</div>
<div id="gridPatron" class="tabla"></div>
<button onclick="guardarPatron()">Guardar</button>
</div>

<div id="tabla"></div>

</div>

<div id="bingoAnim">🎉 BINGO 🎉</div>
<div id="casiBingoAnim">⚠️ FALTA 1 PARA BINGO</div>

<script>

/* PARAMS + VENCIMIENTO */
const params=new URLSearchParams(location.search);

const vence=params.get("vence");
if(vence){
let hoy=new Date();
let v=new Date(vence+"T23:59:59");
if(hoy>v){
document.body.innerHTML="<h1 style='color:red;text-align:center'>⛔ VENCIDA</h1>";
throw new Error();
}
}

/* LOGO */
const logoURL=params.get("logo");
document.getElementById("logo").src=logoURL
? "https://raw.githubusercontent.com/victordjjefe/bingo-digital/main/"+logoURL+".png"
: "https://raw.githubusercontent.com/victordjjefe/bingo-digital/main/laterraza.png";

document.getElementById("nombreJugador").textContent=params.get("nombres")||"";

/* AUDIO */
let audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function beep(){
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.connect(g);g.connect(audioCtx.destination);
o.start();
g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.2);
}
function aplausos(){
let o=audioCtx.createOscillator();
o.frequency.value=200;
o.connect(audioCtx.destination);
o.start();
o.stop(audioCtx.currentTime+1);
}

/* VARIABLES */
let modoActual="";
let estados=[];
let bingoActivo=false;
let patronPersonalizado=Array(5).fill().map(()=>Array(5).fill(false));

/* UI */
function mostrarModos(){
let s=document.getElementById("modoSelect");
s.style.display=s.style.display==="block"?"none":"block";
}

function seleccionarModo(){
modoActual=document.getElementById("modoSelect").value;
if(modoActual==="Personalizado"){
document.getElementById("editorPatron").style.display="block";
crearEditorPatron();
}else{
document.getElementById("editorPatron").style.display="none";
}
}

/* PATRON */
function crearEditorPatron(){
let g=document.getElementById("gridPatron");
g.innerHTML="";
for(let i=0;i<5;i++){
for(let j=0;j<5;j++){
let d=document.createElement("div");
d.className="celda";
if(i!==2||j!==2){
d.onclick=()=>{
patronPersonalizado[i][j]=!patronPersonalizado[i][j];
d.classList.toggle("marcado");
};
}
g.appendChild(d);
}
}
}
function guardarPatron(){
document.getElementById("editorPatron").style.display="none";
}

/* LIMPIAR */
function limpiarTabla(){
document.querySelectorAll(".celda.marcado").forEach(c=>{
if(!c.classList.contains("centro")) c.classList.remove("marcado");
});
estados.forEach(t=>{
for(let i=0;i<5;i++){
for(let j=0;j<5;j++) t[i][j]=false;
}
t[2][2]=true;
});
bingoActivo=false;
}

/* VERIFICAR */
function verificar(m){
if(!modoActual) return false;
const c=(i,j)=>m[i][j]||(i===2&&j===2);

switch(modoActual){
case "Letra X":
return [[0,0],[1,1],[2,2],[3,3],[4,4],[0,4],[1,3],[3,1],[4,0]].every(([i,j])=>c(i,j));
case "4 Esquinas":
return c(0,0)&&c(0,4)&&c(4,0)&&c(4,4);
case "Diagonal Izq":
return [...Array(5).keys()].every(i=>c(i,i));
case "Diagonal Der":
return [...Array(5).keys()].every(i=>c(i,4-i));
case "Tabla Llena":
return m.flat().every(v=>v);
case "Personalizado":
for(let i=0;i<5;i++){
for(let j=0;j<5;j++){
if(patronPersonalizado[i][j]&&!c(i,j)) return false;
}
}
return true;
default:
return false;
}
}

/* CASI */
function verificarCasi(m){
if(!modoActual) return false;
const c=(i,j)=>m[i][j]||(i===2&&j===2);

let coords=[[0,0],[1,1],[2,2],[3,3],[4,4]];
let faltan=coords.filter(([i,j])=>!c(i,j)).length;
return faltan===1;
}

/* BINGO */
function mostrarBingo(){
if(bingoActivo) return;
bingoActivo=true;

let b=document.getElementById("bingoAnim");
b.style.display="flex";
aplausos();

setTimeout(()=>b.style.display="none",4000);
}

/* TABLAS */
let ids=params.get("tablas").split(",");
let cont=document.getElementById("tabla");

ids.forEach(id=>{
let bloque=document.createElement("div");
bloque.className="bloqueTabla";

let grid=document.createElement("div");
grid.className="tabla";

let estado=Array(5).fill().map(()=>Array(5).fill(false));
estado[2][2]=true;
estados.push(estado);

for(let i=0;i<5;i++){
for(let j=0;j<5;j++){

let d=document.createElement("div");
d.className="celda";

if(i===2&&j===2){
d.textContent="T"+id.padStart(3,"0");
d.classList.add("marcado","centro");
}else{
d.textContent=Math.floor(Math.random()*75)+1;

d.onclick=()=>{
beep();

d.classList.toggle("marcado");
estado[i][j]=d.classList.contains("marcado");

if(!verificar(estado)) bingoActivo=false;

if(verificarCasi(estado)){
let a=document.getElementById("casiBingoAnim");
a.style.display="block";
setTimeout(()=>a.style.display="none",1500);
}

if(verificar(estado)) mostrarBingo();
};
}

grid.appendChild(d);
}
}

bloque.appendChild(grid);
cont.appendChild(bloque);
});

</script>
</body>
</html>
