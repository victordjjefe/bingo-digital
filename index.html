<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tabla Bingo</title>

<style>
body{
margin:0;
background: radial-gradient(circle, #1a0033, #000);
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
min-height:100vh;
padding:20px;
}

.logo{
max-width:100%;
max-height:180px;
width:auto;
height:auto;
object-fit:contain;
display:block;
margin:0 auto 10px auto;
}

.botonModo{
position:absolute;
top:20px;
right:20px;
background:#ffd700;
color:black;
border:none;
padding:6px 10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.menuModo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
border:2px solid #ffd700;
padding:20px;
border-radius:12px;
display:none;
z-index:1000;
text-align:center;
}

.menuModo button{
display:block;
margin:5px 0;
width:150px;
padding:8px;
cursor:pointer;
}

#bingoAnim{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
font-size:70px;
font-weight:bold;
color:#ffd700;
background:rgba(0,0,0,0.8);
z-index:2000;
}

.contenedor{
background:rgba(0,0,0,0.7);
padding:20px;
border-radius:15px;
box-shadow:0 0 25px #ffd700;
text-align:center;
}

.titulo{
font-size:24px;
color:#ffd700;
margin-bottom:10px;
font-weight:bold;
}

.tabla{
display:grid;
grid-template-columns: repeat(5, 70px);
gap:8px;
justify-content:center;
margin-bottom:25px;
}

.celda{
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:70px;
font-size:22px;
border-radius:12px;
font-weight:bold;
border:2px solid #444;
transition:0.15s;
user-select:none;
}

.celda:active{
transform:scale(0.9);
}

.letra{
background:#ffd700;
color:black;
font-size:22px;
}

.marcado{
background:#00ff00 !important;
color:black;
box-shadow:0 0 15px #00ff00;
transform:scale(1.1);
}

.celda:hover{
background:#222;
cursor:pointer;
}
</style>
</head>

<body>

<button class="botonModo" onclick="abrirModo()">Modo de juego</button>

<div id="menuModo" class="menuModo">
<b>Modo de juego</b><br><br>
<button onclick="seleccionarModo('X')">X</button>
<button onclick="seleccionarModo('L')">L</button>
<button onclick="seleccionarModo('H')">H</button>
<button onclick="seleccionarModo('T')">T</button>
<button onclick="seleccionarModo('DIAG1')">Diagonal ↘</button>
<button onclick="seleccionarModo('DIAG2')">Diagonal ↙</button>
<button onclick="seleccionarModo('ESQUINAS')">4 Esquinas</button>
<button onclick="seleccionarModo('O')">Forma O</button>
<button onclick="seleccionarModo('LLENO')">Tabla llena</button>
</div>

<div id="bingoAnim">🎉 BINGO 🎉</div>

<div class="contenedor">

<img id="logo" class="logo">

<div class="titulo">LA TERRAZA BINGO</div>

<div id="tabla"></div>

</div>

<script>

let modoJuego=null;

function abrirModo(){
document.getElementById("menuModo").style.display="block";
}

function seleccionarModo(m){
modoJuego=m;
document.getElementById("menuModo").style.display="none";
alert("Modo seleccionado: "+m);
}

function mostrarBingo(){
let b=document.getElementById("bingoAnim");
b.style.display="flex";
setTimeout(()=>{b.style.display="none"},4000);
}

function generarTablaPorID(id){

let seed = 12345;

function random(){
seed = (seed * 9301 + 49297) % 233280;
return seed / 233280;
}

function randomUnique(min,max,count){
let nums=[];
while(nums.length<count){
let n=Math.floor(random()*(max-min+1))+min;
if(!nums.includes(n)) nums.push(n);
}
return nums;
}

let tabla;

for(let t=1;t<=id;t++){

let B=randomUnique(1,15,5);
let I=randomUnique(16,30,5);
let N=randomUnique(31,45,5);
let G=randomUnique(46,60,5);
let O=randomUnique(61,75,5);

tabla=[];

for(let i=0;i<5;i++){
tabla[i]=[B[i],I[i],N[i],G[i],O[i]];
}

tabla[2][2]="T"+String(t).padStart(3,'0');
}

return tabla;
}

const params = new URLSearchParams(window.location.search);
const vence = params.get("vence");

if(!vence){
document.body.innerHTML="<h1 style='text-align:center;margin-top:100px;color:red;'>⚠️ Este enlace ya no es válido</h1>";
throw new Error("link inválido");
}

const hoy = new Date();
const fechaLimite = new Date(vence+"T23:59:59");

if(hoy>fechaLimite){
document.body.innerHTML="<h1 style='text-align:center;margin-top:100px;color:red;'>⚠️ Esta tabla pertenece a un bingo anterior</h1>";
throw new Error("tabla vencida");
}

const logoURL = params.get("logo");
const logo = document.getElementById("logo");

if(logoURL){
logo.src="https://raw.githubusercontent.com/victordjjefe/bingo-digital/refs/heads/main/"+logoURL+".png";
}else{
logo.src="https://raw.githubusercontent.com/victordjjefe/bingo-digital/refs/heads/main/laterraza.png";
}

let lista=params.get("tablas");

if(!lista){
alert("No tienes tablas asignadas");
throw new Error("Sin tablas");
}

let ids=lista.split(",").map(n=>parseInt(n));

const contenedor=document.getElementById("tabla");

const sonido=new Audio('https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg');

function revisarBingo(grid){

if(!modoJuego) return;

let c=[...grid.querySelectorAll(".celda:not(.letra)")];

let m=i=>c[i].classList.contains("marcado");

if(modoJuego==="ESQUINAS"){
if(m(0)&&m(4)&&m(20)&&m(24)) mostrarBingo();
}

if(modoJuego==="DIAG1"){
if(m(0)&&m(6)&&m(18)&&m(24)) mostrarBingo();
}

if(modoJuego==="DIAG2"){
if(m(4)&&m(8)&&m(16)&&m(20)) mostrarBingo();
}

if(modoJuego==="LLENO"){
let ok=true;
c.forEach((d,i)=>{
if(i!==12 && !d.classList.contains("marcado")) ok=false;
});
if(ok) mostrarBingo();
}

}

ids.forEach(id=>{

let tabla=generarTablaPorID(id);

let bloque=document.createElement("div");

let titulo=document.createElement("div");
titulo.textContent="TABLA T"+String(id).padStart(3,'0');
titulo.style.color="#ffd700";
titulo.style.marginBottom="5px";
titulo.style.fontWeight="bold";

bloque.appendChild(titulo);

let grid=document.createElement("div");
grid.className="tabla";

const letras=["B","I","N","G","O"];

letras.forEach(l=>{
let d=document.createElement("div");
d.className="celda letra";
d.textContent=l;
grid.appendChild(d);
});

for(let i=0;i<5;i++){
for(let j=0;j<5;j++){

let valor=tabla[i][j];

let d=document.createElement("div");
d.className="celda";
d.textContent=valor;

if(typeof valor==="number"){
d.onclick=()=>{
d.classList.toggle("marcado");

sonido.currentTime=0;
sonido.play().catch(e=>{});

if(navigator.vibrate){
navigator.vibrate(100);
}

revisarBingo(grid);

};
}

grid.appendChild(d);

}
}

bloque.appendChild(grid);
contenedor.appendChild(bloque);

});
</script>

</body>
</html>
