<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tabla Bingo</title>

<style>

body{
margin:0;
background: radial-gradient(circle,#1a0033,#000);
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
padding:10px;
}

.logo{max-height:120px;}

.logoNombre{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

.nombreJugador{
font-size:20px;
font-weight:bold;
color:#ffd700;
}

.topBar{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
margin-bottom:15px;
}

button{
padding:6px 10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.botonModo{background:#ffd700;}
.botonLimpiar{background:#ff4444;color:white;}

.selectModo{display:none;}

.contenedor{
background:rgba(0,0,0,0.7);
padding:15px;
border-radius:15px;
box-shadow:0 0 20px #ffd700;
max-width:400px;
width:100%;
}

.bloqueTabla{
background:#111;
padding:10px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(255,215,0,0.2);
}

.tabla{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

.celda{
background:#111;
display:flex;
justify-content:center;
align-items:center;
aspect-ratio:1;
border-radius:10px;
border:2px solid #444;
font-weight:bold;
}

.letra{background:#ffd700;color:black;}

.marcado{
background:#00ff00 !important;
color:black;
box-shadow:0 0 10px #00ff00;
}

.centro{
animation:brillo 1.5s infinite alternate;
}

@keyframes brillo{
0%{box-shadow:0 0 10px #0f0;}
100%{box-shadow:0 0 25px #0f0;}
}

#bingoAnim{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
display:none;
color:#0f0;
}

#casiBingoAnim{
position:fixed;
top:30%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
display:none;
color:#ffd700;
animation:parpadeo .7s infinite alternate;
}

@keyframes parpadeo{
0%{opacity:1;}
100%{opacity:0.4;}
}

</style>
</head>

<body>

<div class="contenedor">

<div class="topBar">

<div class="logoNombre">
<img id="logo" class="logo">
<div id="nombreJugador" class="nombreJugador"></div>
</div>

<button class="botonModo" onclick="mostrarModos()">Modo de juego</button>

<select id="modoSelect" class="selectModo" onchange="seleccionarModo()">
<option value="">-- Elegir modo --</option>
<option>Letra X</option>
<option>Letra L</option>
<option>Letra H</option>
<option>Letra T</option>
<option>Diagonal Izq</option>
<option>Diagonal Der</option>
<option>4 Esquinas</option>
<option>Forma O</option>
<option>Tabla Llena</option>
<option>Personalizado</option>
</select>

<button class="botonLimpiar" onclick="limpiarTabla()">Limpiar tabla</button>

</div>

<div id="editorPatron" style="display:none">
<div>Selecciona el patrón:</div>
<div id="gridPatron" class="tabla"></div>
<button onclick="guardarPatron()">Guardar patrón</button>
</div>

<div id="tabla"></div>

</div>

<div id="bingoAnim">🎉 BINGO 🎉</div>
<div id="casiBingoAnim">⚠️ FALTA 1 PARA BINGO</div>

<script>

/* FECHA VENCIMIENTO */
const params=new URLSearchParams(window.location.search);
const vence=params.get("vence");

if(vence){
let hoy=new Date();
let fechaVence=new Date(vence+"T23:59:59");
if(hoy>fechaVence){
document.body.innerHTML="<h2 style='color:red;text-align:center;margin-top:50px;'>⛔ TABLA VENCIDA</h2>";
throw new Error("Vencido");
}
}

/* AUDIO */
let audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function beep(){
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.connect(g);
g.connect(audioCtx.destination);
o.frequency.value=800;
o.start();
g.gain.exponentialRampToValueAtTime(0.00001,audioCtx.currentTime+0.15);
}

function aplausos(){
let buffer=audioCtx.createBuffer(1,44100,44100);
let data=buffer.getChannelData(0);
for(let i=0;i<44100;i++){data[i]=Math.random()*2-1;}
let src=audioCtx.createBufferSource();
src.buffer=buffer;
let gain=audioCtx.createGain();
gain.gain.setValueAtTime(0.5,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+1);
src.connect(gain);
gain.connect(audioCtx.destination);
src.start();
}

/* VARIABLES */
let modoActual="";
let patronPersonalizado=Array(5).fill().map(()=>Array(5).fill(false));
let estados=[];

/* UI */
function mostrarModos(){
let s=document.getElementById("modoSelect");
s.style.display=s.style.display==="block"?"none":"block";
}

function seleccionarModo(){
modoActual=document.getElementById("modoSelect").value;

if(modoActual==="Personalizado"){
document.getElementById("editorPatron").style.display="block";
crearEditorPatron();
}else{
document.getElementById("editorPatron").style.display="none";
}
}

/* PATRON */
function crearEditorPatron(){
let grid=document.getElementById("gridPatron");
grid.innerHTML="";
for(let i=0;i<5;i++){
for(let j=0;j<5;j++){
let d=document.createElement("div");
d.className="celda";
if(i===2&&j===2){
d.textContent="★";
}else{
d.onclick=()=>{
patronPersonalizado[i][j]=!patronPersonalizado[i][j];
d.classList.toggle("patron");
};
}
grid.appendChild(d);
}
}
}

function guardarPatron(){
document.getElementById("editorPatron").style.display="none";
}

/* VERIFICAR */
function verificar(m){
const c=(i,j)=>m[i][j]||(i===2&&j===2);

switch(modoActual){

case "Letra X":
return c(0,0)&&c(1,1)&&c(2,2)&&c(3,3)&&c(4,4)&&
c(0,4)&&c(1,3)&&c(3,1)&&c(4,0);

case "Tabla Llena":
return m.flat().every(v=>v);

case "Personalizado":
for(let i=0;i<5;i++){
for(let j=0;j<5;j++){
if(patronPersonalizado[i][j]&&!c(i,j)) return false;
}
}
return true;

default:
return false;
}
}

/* CASI BINGO REAL */
function verificarCasiBingo(m){
const c=(i,j)=>m[i][j]||(i===2&&j===2);

if(modoActual==="Letra X"){
let coords=[[0,0],[1,1],[2,2],[3,3],[4,4],[0,4],[1,3],[3,1],[4,0]];
let faltan=0;
coords.forEach(([i,j])=>{if(!c(i,j)) faltan++;});
return faltan===1;
}

if(modoActual==="Tabla Llena"){
return m.flat().filter(v=>v).length===24;
}

return false;
}

function mostrarCasiBingo(){
let a=document.getElementById("casiBingoAnim");
a.style.display="block";
setTimeout(()=>a.style.display="none",2000);
}

/* BINGO */
function mostrarBingo(){
let b=document.getElementById("bingoAnim");
b.style.display="block";
aplausos();
setTimeout(()=>b.style.display="none",5000);
}

/* GENERAR TABLA ORIGINAL */
function generarTablaPorID(id){
let seed=12345;
function random(){
seed=(seed*9301+49297)%233280;
return seed/233280;
}
function randomUnique(min,max,count){
let nums=[];
while(nums.length<count){
let n=Math.floor(random()*(max-min+1))+min;
if(!nums.includes(n)) nums.push(n);
}
return nums;
}
let tabla;
for(let t=1;t<=id;t++){
let B=randomUnique(1,15,5);
let I=randomUnique(16,30,5);
let N=randomUnique(31,45,5);
let G=randomUnique(46,60,5);
let O=randomUnique(61,75,5);
tabla=[];
for(let i=0;i<5;i++){
tabla[i]=[B[i],I[i],N[i],G[i],O[i]];
}
tabla[2][2]="T"+String(t).padStart(3,'0');
}
return tabla;
}

/* PARAMS */
const logoURL=params.get("logo");
document.getElementById("logo").src=logoURL
? "https://raw.githubusercontent.com/victordjjefe/bingo-digital/main/"+logoURL+".png"
: "https://raw.githubusercontent.com/victordjjefe/bingo-digital/main/laterraza.png";

document.getElementById("nombreJugador").textContent=params.get("nombres")||"";

let ids=params.get("tablas").split(",");

let contenedor=document.getElementById("tabla");

/* CREAR TABLAS */
ids.forEach(id=>{

let tabla=generarTablaPorID(id);

let bloque=document.createElement("div");
bloque.className="bloqueTabla";

let grid=document.createElement("div");
grid.className="tabla";

["B","I","N","G","O"].forEach(l=>{
let d=document.createElement("div");
d.className="celda letra";
d.textContent=l;
grid.appendChild(d);
});

let estado=Array(5).fill().map(()=>Array(5).fill(false));
estado[2][2]=true;
estados.push(estado);

for(let i=0;i<5;i++){
for(let j=0;j<5;j++){

let d=document.createElement("div");
d.className="celda";
d.textContent=tabla[i][j];

if(i===2&&j===2){
d.classList.add("marcado","centro");
}else{
d.onclick=()=>{
beep();
d.classList.toggle("marcado");
estado[i][j]=d.classList.contains("marcado");

if(verificarCasiBingo(estado)) mostrarCasiBingo();

if(verificar(estado)) mostrarBingo();
};
}

grid.appendChild(d);
}
}

bloque.appendChild(grid);
contenedor.appendChild(bloque);

});

</script>

</body>
</html>
