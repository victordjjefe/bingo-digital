<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tabla Bingo</title>

<style>

body{
margin:0;
background: radial-gradient(circle,#1a0033,#000);
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
padding:10px;
}

.logo{
max-width:100%;
max-height:140px;
object-fit:contain;
display:block;
margin:auto;
}

.topBar{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
margin-bottom:10px;
width:100%;
}

.topRow{
display:flex;
align-items:center;
justify-content:space-between;
width:100%;
gap:10px;
flex-wrap:wrap;
}

.botonModo{
padding:6px 10px;
font-size:14px;
background:#ffd700;
color:black;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.selectModo{
padding:6px;
border-radius:8px;
display:none;
}

.botonLimpiar{
padding:6px 12px;
font-size:13px;
background:#ff4444;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.nombreJugador{
padding:6px 12px;
border-radius:10px;
background:rgba(255,215,0,0.15);
border:1px solid #ffd700;
color:#ffd700;
font-weight:bold;
box-shadow:0 0 10px #ffd700,0 0 20px rgba(255,215,0,0.4);
white-space:nowrap;
}

.contenedor{
background:rgba(0,0,0,0.7);
padding:15px;
border-radius:15px;
box-shadow:0 0 20px #ffd700;
text-align:center;
width:100%;
max-width:400px;
}

.tabla{
display:grid;
grid-template-columns: repeat(5,1fr);
gap:6px;
}

.celda{
background:#111;
display:flex;
justify-content:center;
align-items:center;
aspect-ratio:1/1;
font-size:18px;
border-radius:10px;
font-weight:bold;
border:2px solid #444;
}

.letra{
background:#ffd700;
color:black;
}

.marcado{
background:#00ff00 !important;
color:black;
box-shadow:0 0 10px #00ff00;
}

.centro{
background:#ffd700 !important;
color:black;
box-shadow:0 0 15px #ffd700,0 0 25px #ffd700;
}

#bingoAnim{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:#00ff00;
font-weight:bold;
display:none;
}

.bloqueTabla{
margin-bottom:25px;
padding:10px;
border:2px solid #ffd700;
border-radius:15px;
box-shadow:0 0 15px rgba(255,215,0,0.4);
background:rgba(255,255,255,0.03);
}

.expirado{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:red;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
z-index:9999;
}

</style>
</head>

<body>

<div id="expiradoMsg" class="expirado" style="display:none;">
⛔ Esta tabla ha expirado ⛔
</div>

<div class="contenedor">

<div class="topBar">

<img id="logo" class="logo">

<button class="botonModo" onclick="mostrarModos()">Modo de juego</button>

<select id="modoSelect" class="selectModo" onchange="seleccionarModo()">
<option value="">-- Elegir modo --</option>
<option>Letra X</option>
<option>Letra L</option>
<option>Letra H</option>
<option>Letra T</option>
<option>Diagonal Izq</option>
<option>Diagonal Der</option>
<option>4 Esquinas</option>
<option>Forma O</option>
<option>Tabla Llena</option>
<option>Personalizado</option>
</select>

<div class="topRow">
<button class="botonLimpiar" onclick="limpiarTabla()">Limpiar tabla</button>
<div id="nombreJugador" class="nombreJugador"></div>
</div>

</div>

<div id="editorPatron" style="display:none;margin-bottom:10px;">
<div style="margin-bottom:5px;">Selecciona el patrón:</div>
<div id="gridPatron" class="tabla"></div>
<button onclick="guardarPatron()" class="botonModo">Guardar patrón</button>
</div>

<div id="tabla"></div>

</div>

<div id="bingoAnim">🎉 BINGO 🎉</div>

<script>

let audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function beep(){
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.connect(g);
g.connect(audioCtx.destination);
o.frequency.value=800;
o.start();
g.gain.exponentialRampToValueAtTime(0.00001,audioCtx.currentTime+0.15);
}

function generarTablaPorID(id){

let seed=12345;

function random(){
seed=(seed*9301+49297)%233280;
return seed/233280;
}

function randomUnique(min,max,count){
let nums=[];
while(nums.length<count){
let n=Math.floor(random()*(max-min+1))+min;
if(!nums.includes(n)) nums.push(n);
}
return nums;
}

let tabla;

for(let t=1;t<=id;t++){

let B=randomUnique(1,15,5);
let I=randomUnique(16,30,5);
let N=randomUnique(31,45,5);
let G=randomUnique(46,60,5);
let O=randomUnique(61,75,5);

tabla=[];
for(let i=0;i<5;i++){
tabla[i]=[B[i],I[i],N[i],G[i],O[i]];
}
tabla[2][2]="T"+String(t).padStart(3,'0');

}

return tabla;
}

let modoActual="";
let patronPersonalizado=Array(5).fill().map(()=>Array(5).fill(false));
let estados=[];
let bingoActivo=false;

function mostrarModos(){
let s=document.getElementById("modoSelect");
s.style.display=s.style.display==="block"?"none":"block";
}

function seleccionarModo(){

modoActual=document.getElementById("modoSelect").value;

if(modoActual==="Personalizado"){
document.getElementById("editorPatron").style.display="block";
crearEditorPatron();
}else{
document.getElementById("editorPatron").style.display="none";
}

}

function limpiarTabla(){

document.querySelectorAll(".celda.marcado").forEach(c=>{
c.classList.remove("marcado");
});

estados.forEach(tabla=>{
for(let i=0;i<5;i++){
for(let j=0;j<5;j++){
tabla[i][j]=false;
}
}
});

modoActual="";
document.getElementById("modoSelect").value="";
document.getElementById("editorPatron").style.display="none";
bingoDetectado=false;

}

function crearEditorPatron(){

const grid=document.getElementById("gridPatron");
grid.innerHTML="";

for(let i=0;i<5;i++){
for(let j=0;j<5;j++){

let d=document.createElement("div");
d.className="celda";

if(i===2 && j===2){
d.textContent="★";
d.style.background="#ffd700";
}else{

d.onclick=()=>{
patronPersonalizado[i][j]=!patronPersonalizado[i][j];
d.classList.toggle("marcado");
};

}

grid.appendChild(d);

}
}
}

function guardarPatron(){
document.getElementById("editorPatron").style.display="none";
alert("Patrón guardado");
}

function verificar(m){

const c=(i,j)=>m[i][j]||(i===2&&j===2);

switch(modoActual){

case "Letra X":
return c(0,0)&&c(1,1)&&c(2,2)&&c(3,3)&&c(4,4)&&
c(0,4)&&c(1,3)&&c(3,1)&&c(4,0);

case "Letra L":
return [0,1,2,3,4].every(i=>c(i,0))&&
[0,1,2,3,4].every(j=>c(4,j));

case "Letra H":
return [0,1,2,3,4].every(i=>c(i,0)&&c(i,4))&&
[0,1,2,3,4].every(j=>c(2,j));

case "Letra T":
return [0,1,2,3,4].every(j=>c(0,j))&&
[0,1,2,3,4].every(i=>c(i,2));

case "Diagonal Izq":
return [0,1,2,3,4].every(i=>c(i,i));

case "Diagonal Der":
return [0,1,2,3,4].every(i=>c(i,4-i));

case "4 Esquinas":
return c(0,0)&&c(0,4)&&c(4,0)&&c(4,4);

case "Forma O":
return [0,1,2,3,4].every(j=>c(0,j)&&c(4,j))&&
[1,2,3].every(i=>c(i,0)&&c(i,4));

case "Tabla Llena":
return m.flat().every(v=>v);

case "Personalizado":

for(let i=0;i<5;i++){
for(let j=0;j<5;j++){
if(patronPersonalizado[i][j]&&!m[i][j]&&!(i===2&&j===2)){
return false;
}
}
}
return true;

default:
return false;
}

}

function mostrarBingo(){

if(bingoDetectado) return;

bingoDetectado=true;

let contenedor=document.querySelector(".contenedor");
let anim=document.getElementById("bingoAnim");

contenedor.style.display="none";
anim.style.display="block";

setTimeout(()=>{
anim.style.display="none";
contenedor.style.display="block";
},5000);

}

const params=new URLSearchParams(window.location.search);

const vence=params.get("vence");
const nombre=params.get("nombre");

function hoyStr(){
let d=new Date();
return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
}

if(vence && vence < hoyStr()){
document.getElementById("expiradoMsg").style.display="flex";
document.querySelector(".contenedor").style.display="none";
}

if(nombre){
document.getElementById("nombreJugador").textContent=nombre;
}

const logoURL=params.get("logo");
const logo=document.getElementById("logo");

logo.src=logoURL
? "https://raw.githubusercontent.com/victordjjefe/bingo-digital/main/"+logoURL+".png"
: "https://raw.githubusercontent.com/victordjjefe/bingo-digital/main/laterraza.png";

let lista=params.get("tablas");
let ids=lista.split(",").map(n=>parseInt(n));

const contenedor=document.getElementById("tabla");

ids.forEach(id=>{

let tabla=generarTablaPorID(id);

let bloque=document.createElement("div");
bloque.className="bloqueTabla";

let grid=document.createElement("div");
grid.className="tabla";

const letras=["B","I","N","G","O"];

letras.forEach(l=>{
let d=document.createElement("div");
d.className="celda letra";
d.textContent=l;
grid.appendChild(d);
});

let estado=Array(5).fill().map(()=>Array(5).fill(false));
estados.push(estado);

for(let i=0;i<5;i++){
for(let j=0;j<5;j++){

let valor=tabla[i][j];

let d=document.createElement("div");
d.className="celda";
d.textContent=valor;

if(i===2 && j===2){
d.classList.add("centro");
estado[i][j]=true;
}else if(typeof valor==="number"){

d.onclick=()=>{

if(bingoActivo) return;

beep();

d.classList.toggle("marcado");
estado[i][j]=d.classList.contains("marcado");

if(verificar(estado)){
mostrarBingo();
}

};

}

grid.appendChild(d);

}
}

bloque.appendChild(grid);
contenedor.appendChild(bloque);

});

</script>

</body>
</html>
