<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tabla Bingo</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle, #1a0033, #000);
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    padding:20px;
}

.logo{
    max-width:100%;
    max-height:180px;
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;
    margin:0 auto 10px auto;
}

.botonModo{
    margin-top:10px;
    padding:6px 12px;
    background:#ffd700;
    color:black;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.selectModo{
    margin-top:10px;
    padding:6px;
    border-radius:8px;
}

.contenedor{
    background:rgba(0,0,0,0.7);
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 25px #ffd700;
    text-align:center;
}

.titulo{
    font-size:24px;
    color:#ffd700;
    margin-bottom:10px;
    font-weight:bold;
}

.tabla{
    display:grid;
    grid-template-columns: repeat(5, 70px);
    gap:8px;
    justify-content:center;
    margin-bottom:25px;
}

.celda{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:70px;
    font-size:22px;
    border-radius:12px;
    font-weight:bold;
    border:2px solid #444;
    transition:0.15s;
    user-select:none;
}

.celda:active{
    transform:scale(0.9);
}

.letra{
    background:#ffd700;
    color:black;
    font-size:22px;
}

.marcado{
    background:#00ff00 !important;
    color:black;
    box-shadow:0 0 15px #00ff00;
    transform:scale(1.1);
}

.celda:hover{
    background:#222;
    cursor:pointer;
}

#bingoAnim{
    position:fixed;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    color:#00ff00;
    font-weight:bold;
    display:none;
    text-shadow:0 0 20px #00ff00;
}
</style>
</head>

<body>

<div class="contenedor">

<img id="logo" class="logo">

<button class="botonModo" onclick="mostrarModos()">Modo de juego</button>

<select id="modoSelect" class="selectModo" style="display:none;" onchange="seleccionarModo()">
<option value="">-- Elegir modo --</option>
<option>Letra X</option>
<option>Letra L</option>
<option>Letra H</option>
<option>Letra T</option>
<option>Diagonal Izq</option>
<option>Diagonal Der</option>
<option>4 Esquinas</option>
<option>Forma O</option>
<option>Tabla Llena</option>
</select>

<div class="titulo">LA TERRAZA BINGO</div>

<div id="tabla"></div>

</div>

<div id="bingoAnim">🎉 BINGO 🎉</div>

<script>

// 🔥 MISMA FUNCIÓN ORIGINAL (NO SE TOCA)
function generarTablaPorID(id){

    let seed = 12345;

    function random(){
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
    }

    function randomUnique(min,max,count){
        let nums=[];
        while(nums.length<count){
            let n=Math.floor(random()*(max-min+1))+min;
            if(!nums.includes(n)) nums.push(n);
        }
        return nums;
    }

    let tabla;

    for(let t=1;t<=id;t++){

        let B=randomUnique(1,15,5);
        let I=randomUnique(16,30,5);
        let N=randomUnique(31,45,5);
        let G=randomUnique(46,60,5);
        let O=randomUnique(61,75,5);

        tabla=[];

        for(let i=0;i<5;i++){
            tabla[i]=[B[i],I[i],N[i],G[i],O[i]];
        }

        tabla[2][2]="FREE";
    }

    return tabla;
}

// 🔥 VARIABLES NUEVAS
let modoActual = "";
let yaGano = false;

function mostrarModos(){
    document.getElementById("modoSelect").style.display="block";
}

function seleccionarModo(){
    modoActual = document.getElementById("modoSelect").value;
}

// 🔥 VERIFICAR PATRONES
function verificarPatron(matriz){

    if(!modoActual || yaGano) return false;

    const m = matriz;

    const marcado = (i,j)=> m[i][j];

    // centro siempre marcado
    m[2][2]=true;

    switch(modoActual){

        case "Letra X":
            return (marcado(0,0)&&marcado(1,1)&&marcado(2,2)&&marcado(3,3)&&marcado(4,4)) &&
                   (marcado(0,4)&&marcado(1,3)&&marcado(3,1)&&marcado(4,0));

        case "Letra L":
            return (m[0].every(v=>v)) && [0,1,2,3,4].every(i=>m[i][0]);

        case "Letra H":
            return [0,1,2,3,4].every(i=>m[i][0] && m[i][4]) && m[2].every(v=>v);

        case "Letra T":
            return m[0].every(v=>v) && [0,1,2,3,4].every(i=>m[i][2]);

        case "Diagonal Izq":
            return [0,1,2,3,4].every(i=>m[i][i]);

        case "Diagonal Der":
            return [0,1,2,3,4].every(i=>m[i][4-i]);

        case "4 Esquinas":
            return m[0][0] && m[0][4] && m[4][0] && m[4][4];

        case "Forma O":
            return (
                m[0].every(v=>v) &&
                m[4].every(v=>v) &&
                [1,2,3].every(i=>m[i][0] && m[i][4])
            );

        case "Tabla Llena":
            return m.flat().every(v=>v);

        default:
            return false;
    }
}

// 🔥 ANIMACIÓN
function mostrarBingo(){
    yaGano = true;
    let anim = document.getElementById("bingoAnim");
    anim.style.display="block";

    let audio = new Audio("https://actions.google.com/sounds/v1/crowd/applause.ogg");
    audio.play().catch(e=>{});

    setTimeout(()=>{ anim.style.display="none"; },3000);
}

// 🔥 NUEVA FORMA DE RECIBIR TABLAS
const params = new URLSearchParams(window.location.search);
const vence = params.get("vence");

if(!vence){
    document.body.innerHTML = "<h1 style='text-align:center;margin-top:100px;color:red;'>⚠️ Este enlace ya no es válido</h1>";
    throw new Error("link inválido");
}

const hoy = new Date();
const fechaLimite = new Date(vence + "T23:59:59");

if(hoy > fechaLimite){
    document.body.innerHTML = "<h1 style='text-align:center;margin-top:100px;color:red;'>⚠️ Esta tabla pertenece a un bingo anterior</h1>";
    throw new Error("tabla vencida");
}

const logoURL = params.get("logo");
const logo = document.getElementById("logo");

if(logoURL){
    logo.src = "https://raw.githubusercontent.com/victordjjefe/bingo-digital/refs/heads/main/" + logoURL + ".png";
}else{
    logo.src = "https://raw.githubusercontent.com/victordjjefe/bingo-digital/refs/heads/main/laterraza.png";
}

let lista = params.get("tablas");

if(!lista){
    alert("No tienes tablas asignadas");
    throw new Error("Sin tablas");
}

let ids = lista.split(",").map(n => parseInt(n));
const contenedor = document.getElementById("tabla");
const sonido = new Audio('https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg');

ids.forEach(id => {

    let tabla = generarTablaPorID(id);

    let bloque = document.createElement("div");

    let titulo = document.createElement("div");
    titulo.textContent = "TABLA T" + String(id).padStart(3,'0');
    titulo.style.color = "#ffd700";
    titulo.style.marginBottom = "5px";
    titulo.style.fontWeight = "bold";

    bloque.appendChild(titulo);

    let grid = document.createElement("div");
    grid.className = "tabla";

    const letras = ["B","I","N","G","O"];

    letras.forEach(l=>{
        let d = document.createElement("div");
        d.className="celda letra";
        d.textContent=l;
        grid.appendChild(d);
    });

    let estado = Array(5).fill().map(()=>Array(5).fill(false));

    for(let i=0;i<5;i++){
        for(let j=0;j<5;j++){

            let valor = tabla[i][j];

            let d = document.createElement("div");
            d.className="celda";
            d.textContent = valor;

            if(i===2 && j===2){
                d.classList.add("marcado");
                estado[i][j]=true;
            }

            if(typeof valor === "number"){
                d.onclick = ()=>{

                    d.classList.toggle("marcado");
                    estado[i][j] = d.classList.contains("marcado");

                    sonido.currentTime = 0;
                    sonido.play().catch(e=>{});

                    if(navigator.vibrate){
                        navigator.vibrate(100);
                    }

                    if(verificarPatron(estado)){
                        mostrarBingo();
                    }
                };
            }

            grid.appendChild(d);
        }
    }

    bloque.appendChild(grid);
    contenedor.appendChild(bloque);

});
</script>

</body>
</html>
