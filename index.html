<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Digital</title>

<style>

body{
margin:0;
background: radial-gradient(circle,#1a0033,#000);
color:white;
font-family:Arial;
display:flex;
justify-content:center;
padding:5px;
}

.contenedor{
width:100%;
max-width:420px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:15px;
box-shadow:0 0 15px #ffd700;
}

/* barra superior */

.topBar{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-bottom:5px;
}

.logo{
max-height:60px;
}

.nombre{
font-size:16px;
font-weight:bold;
color:#00ffff;
}

/* tabla */

.tabla{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
}

.celda{
background:#111;
display:flex;
align-items:center;
justify-content:center;
aspect-ratio:1/1;
border-radius:8px;
font-weight:bold;
font-size:18px;
border:2px solid #333;
}

.letra{
background:#ffd700;
color:black;
}

.marcado{
background:#00ff00 !important;
color:black;
box-shadow:0 0 10px #00ff00;
}

</style>
</head>

<body>

<div class="contenedor">

<div class="topBar">
<img id="logo" class="logo">
<div id="nombre" class="nombre"></div>
</div>

<div id="tablasContainer"></div>

</div>

<script>

/* leer parametros */

const params = new URLSearchParams(window.location.search);

const tablasParam = params.get("tablas");
const vence = params.get("vence");
const nombre = params.get("nombre");

/* mostrar nombre */

if(nombre){
document.getElementById("nombre").textContent = nombre;
}

/* logo */

document.getElementById("logo").src =
"https://raw.githubusercontent.com/victordjjefe/bingo-digital/main/laterraza.png";

/* verificar vencimiento */

if(vence){

let hoy = new Date();
let fechaVence = new Date(vence);

if(hoy > fechaVence){

document.body.innerHTML="<h2 style='color:white;text-align:center;margin-top:50px'>TABLA VENCIDA</h2>";
throw new Error("Tabla vencida");

}

}

/* generar tabla */

function generarTabla(){

let nums=[];

while(nums.length<24){

let n=Math.floor(Math.random()*75)+1;

if(!nums.includes(n)) nums.push(n);

}

nums.splice(12,0,"★");

return nums;

}

/* sonido */

let audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function beep(){

let o = audioCtx.createOscillator();
let g = audioCtx.createGain();

o.connect(g);
g.connect(audioCtx.destination);

o.frequency.value = 700;

o.start();

g.gain.exponentialRampToValueAtTime(
0.00001,
audioCtx.currentTime+0.15
);

}

/* crear tablas */

const contenedor = document.getElementById("tablasContainer");

const letras = ["B","I","N","G","O"];

let listaTablas = tablasParam.split(",");

listaTablas.forEach(id=>{

let titulo = document.createElement("div");
titulo.style.textAlign="center";
titulo.style.color="#ffd700";
titulo.style.margin="6px";
titulo.textContent="TABLA "+id;

contenedor.appendChild(titulo);

let grid = document.createElement("div");
grid.className="tabla";

letras.forEach(l=>{

let d=document.createElement("div");
d.className="celda letra";
d.textContent=l;

grid.appendChild(d);

});

let numeros = generarTabla();

numeros.forEach(n=>{

let d=document.createElement("div");

d.className="celda";
d.textContent=n;

if(n!=="★"){

d.onclick=()=>{

beep();
d.classList.toggle("marcado");

};

}

grid.appendChild(d);

});

contenedor.appendChild(grid);

});

</script>

</body>
</html>
