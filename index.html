<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tabla Bingo</title>

<style>
body{
margin:0;
background: radial-gradient(circle,#1a0033,#000);
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
padding:10px;
}

.logo{
max-width:100%;
max-height:140px;
object-fit:contain;
display:block;
margin:auto;
}

.logoNombre{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:5px;
}

.nombreJugador{
font-size:20px;
font-weight:700;
color:#ffd700;
letter-spacing:1px;
padding:6px 12px;
border-radius:10px;
background:linear-gradient(145deg,#111,#222);
box-shadow:0 0 10px rgba(255,215,0,0.4);
border:1px solid rgba(255,215,0,0.3);
text-transform:uppercase;
}

.topBar{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
margin-bottom:15px;
}

.botonModo{
padding:6px 10px;
font-size:14px;
background:#ffd700;
color:black;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.selectModo{
padding:6px;
border-radius:8px;
display:none;
}

.botonLimpiar{
padding:5px 10px;
font-size:13px;
background:#ff4444;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.contenedor{
background:rgba(0,0,0,0.7);
padding:15px;
border-radius:15px;
box-shadow:0 0 20px #ffd700;
text-align:center;
width:100%;
max-width:400px;
}

.bloqueTabla{
background:rgba(20,20,20,0.9);
padding:10px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,0.8), 0 0 10px rgba(255,215,0,0.2);
border:1px solid rgba(255,255,255,0.05);
}

.tabla{
display:grid;
grid-template-columns: repeat(5,1fr);
gap:6px;
}

.celda{
background:#111;
display:flex;
justify-content:center;
align-items:center;
aspect-ratio:1/1;
font-size:18px;
border-radius:10px;
font-weight:bold;
border:2px solid #444;
}

.letra{
background:#ffd700;
color:black;
}

.marcado{
background:#00ff00 !important;
color:black;
box-shadow:0 0 10px #00ff00;
}

.centro{
animation: brilloCentro 1.5s infinite alternate;
}

@keyframes brilloCentro{
0%{ box-shadow:0 0 10px #00ff00; }
100%{ box-shadow:0 0 25px #00ff00; }
}

/* BINGO FULL */
#bingoAnim{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
font-size:60px;
color:#00ff00;
z-index:9999;
}

#casiBingoAnim{
position:fixed;
top:30%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
display:none;
color:#ffd700;
animation:parpadeo .7s infinite alternate;
}

@keyframes parpadeo{
0%{opacity:1;}
100%{opacity:0.4;}
}
</style>
</head>

<body>

<div class="contenedor">

<div class="topBar">

<div class="logoNombre">
<img id="logo" class="logo">
<div id="nombreJugador" class="nombreJugador"></div>
</div>

<button class="botonModo" onclick="mostrarModos()">Modo de juego</button>

<select id="modoSelect" class="selectModo" onchange="seleccionarModo()">
<option value="">-- Elegir modo --</option>
<option>Letra X</option>
<option>Letra L</option>
<option>Letra H</option>
<option>Letra T</option>
<option>Diagonal Izq</option>
<option>Diagonal Der</option>
<option>4 Esquinas</option>
<option>Forma O</option>
<option>Tabla Llena</option>
<option>Personalizado</option>
</select>

<button class="botonLimpiar" onclick="limpiarTabla()">Limpiar tabla</button>

</div>

<div id="editorPatron" style="display:none;margin-bottom:10px;">
<div>Selecciona el patrón:</div>
<div id="gridPatron" class="tabla"></div>
<button onclick="guardarPatron()" class="botonModo">Guardar patrón</button>
</div>

<div id="tabla"></div>

</div>

<div id="bingoAnim">🎉 BINGO 🎉</div>
<div id="casiBingoAnim">⚠️ FALTA 1 PARA BINGO</div>

<script>

/* VENCIMIENTO (NO TOCADO) */
const params=new URLSearchParams(window.location.search);
const vence=params.get("vence");
if(vence){
let hoy=new Date();
let v=new Date(vence+"T23:59:59");
if(hoy>v){
document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:50px;'>⛔ TABLA VENCIDA</h1>";
throw new Error();
}
}

/* AUDIO */
let audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function beep(){
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.connect(g); g.connect(audioCtx.destination);
o.frequency.value=800;
o.start();
g.gain.exponentialRampToValueAtTime(0.00001,audioCtx.currentTime+0.15);
}

function aplausos(){
let buffer=audioCtx.createBuffer(1,44100,44100);
let data=buffer.getChannelData(0);
for(let i=0;i<44100;i++){data[i]=Math.random()*2-1;}
let src=audioCtx.createBufferSource();
src.buffer=buffer;
let g=audioCtx.createGain();
g.gain.setValueAtTime(0.6,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+1);
src.connect(g); g.connect(audioCtx.destination);
src.start();
}

/* VARIABLES */
let modoActual="";
let patronPersonalizado=Array(5).fill().map(()=>Array(5).fill(false));
let estados=[];
let bingoActivo=false;

/* UI */
function mostrarModos(){
let s=document.getElementById("modoSelect");
s.style.display=s.style.display==="block"?"none":"block";
}

function seleccionarModo(){
modoActual=document.getElementById("modoSelect").value;

if(modoActual==="Personalizado"){
document.getElementById("editorPatron").style.display="block";
crearEditorPatron();
}else{
document.getElementById("editorPatron").style.display="none";
}
}

/* LIMPIAR */
function limpiarTabla(){

document.querySelectorAll(".celda.marcado").forEach(c=>{
if(!c.classList.contains("centro")){
c.classList.remove("marcado");
}
});

estados.forEach(tabla=>{
for(let i=0;i<5;i++){
for(let j=0;j<5;j++){
tabla[i][j]=false;
}
}
tabla[2][2]=true;
});

bingoActivo=false;

document.getElementById("bingoAnim").style.display="none";
document.querySelector(".contenedor").style.display="block";
}

/* BINGO */
function mostrarBingo(){

if(bingoActivo) return;

bingoActivo=true;

let b=document.getElementById("bingoAnim");
let contenedor=document.querySelector(".contenedor");

b.style.display="flex";
contenedor.style.display="none";

aplausos();

setTimeout(()=>{
b.style.display="none";
contenedor.style.display="block";
},4000);
}

/* TABLA ORIGINAL */
function generarTablaPorID(id){
let seed=12345;
function random(){
seed=(seed*9301+49297)%233280;
return seed/233280;
}
function randomUnique(min,max,count){
let nums=[];
while(nums.length<count){
let n=Math.floor(random()*(max-min+1))+min;
if(!nums.includes(n)) nums.push(n);
}
return nums;
}
let tabla;
for(let t=1;t<=id;t++){
let B=randomUnique(1,15,5);
let I=randomUnique(16,30,5);
let N=randomUnique(31,45,5);
let G=randomUnique(46,60,5);
let O=randomUnique(61,75,5);
tabla=[];
for(let i=0;i<5;i++){
tabla[i]=[B[i],I[i],N[i],G[i],O[i]];
}
tabla[2][2]="T"+String(t).padStart(3,'0');
}
return tabla;
}

/* PARAMS */
const logoURL=params.get("logo");
document.getElementById("logo").src=logoURL
? "https://raw.githubusercontent.com/victordjjefe/bingo-digital/main/"+logoURL+".png"
: "https://raw.githubusercontent.com/victordjjefe/bingo-digital/main/laterraza.png";

document.getElementById("nombreJugador").textContent=params.get("nombres")||"";

let ids=params.get("tablas").split(",").map(n=>parseInt(n));

let contenedor=document.getElementById("tabla");

/* CREAR TABLAS */
ids.forEach(id=>{

let tabla=generarTablaPorID(id);

let bloque=document.createElement("div");
bloque.className="bloqueTabla";

let grid=document.createElement("div");
grid.className="tabla";

["B","I","N","G","O"].forEach(l=>{
let d=document.createElement("div");
d.className="celda letra";
d.textContent=l;
grid.appendChild(d);
});

let estado=Array(5).fill().map(()=>Array(5).fill(false));
estado[2][2]=true;
estados.push(estado);

for(let i=0;i<5;i++){
for(let j=0;j<5;j++){

let d=document.createElement("div");
d.className="celda";
d.textContent=tabla[i][j];

if(i===2&&j===2){
d.classList.add("marcado","centro");
}else{
d.onclick=()=>{

document.getElementById("bingoAnim").style.display="none";
document.querySelector(".contenedor").style.display="block";

beep();

d.classList.toggle("marcado");
estado[i][j]=d.classList.contains("marcado");

if(!verificar(estado)){
bingoActivo=false;
}

if(verificar(estado)) mostrarBingo();
};
}

grid.appendChild(d);
}
}

bloque.appendChild(grid);
contenedor.appendChild(bloque);

});

/* VERIFICAR */
function verificar(m){
const c=(i,j)=>m[i][j]||(i===2&&j===2);

switch(modoActual){
case "Letra X":
return [[0,0],[1,1],[2,2],[3,3],[4,4],[0,4],[1,3],[3,1],[4,0]]
.every(([i,j])=>c(i,j));
case "Tabla Llena":
return m.flat().every(v=>v);
case "Personalizado":
for(let i=0;i<5;i++){
for(let j=0;j<5;j++){
if(patronPersonalizado[i][j]&&!c(i,j)) return false;
}
}
return true;
default:
return false;
}
}

</script>

</body>
</html>
